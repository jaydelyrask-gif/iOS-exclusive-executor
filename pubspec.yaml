name: ios_ai_executor
description: 🍎 Enterprise-grade iOS AI Lua Executor - Superior to Windows with native Mach APIs, streaming AI, advanced memory scanning, and professional IDE.

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 🎯 Core UI & Code Editing
  flutter_code_editor: ^0.3.2
  syntax_highlight: ^0.0.9
  code_text_field: ^1.9.6
  
  # 🤖 AI & Streaming
  google_generative_ai: ^0.4.6
  http: ^1.2.0
  stream_transform: ^2.1.0
  
  # 💾 Storage & Caching
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  
  # 📡 Networking
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  connectivity_plus: ^6.1.1
  
  # 🎨 UI & Design
  flutter_animate: ^4.2.1
  animations: ^2.0.11
  google_fonts: ^6.2.1
  
  # 📁 File Management
  file_picker: ^8.1.6
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # 🔐 Security
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  
  # 📊 Logging & Analytics
  logger: ^2.4.0
  sentry_flutter: ^8.8.0
  
  # 🧪 Developer Tools
  dart_code_metrics: ^5.9.0
  
  # 🎵 Haptics & Sensors
  haptic_feedback: ^2.3.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icons/
    - assets/themes/
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

plugin:
  platforms:
    ios:
      pluginClass: IOSExecutorPlugin
